workflows:
  njabulo-app:
    name: Njabulo Jb App
    max_build_duration: 30
    instance_type: mac_mini_m1
    environment:
      flutter: 3.16.0
      xcode: latest
    scripts:
      - name: Build Release APK
        script: |
          flutter build apk --release
          cp build/app/outputs/flutter-apk/app-release.apk Njabulo-Jb.apk
    artifacts:
      - Njabulo-Jb.apk
